<!DOCTYPE html>
<html lang="en-us">

  {% include head.html %}

  <body>

    <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-label="Toggle sidebar">
      &lt;
    </button>

    {% include sidebar.html %}

    <div class="content container">
      {{ content }}
    </div>

    <script>
      (function () {
        var storageKey = "theme-mode";
        var darkStylesheet = document.getElementById("dark-theme-stylesheet");
        var toggle = document.getElementById("theme-toggle");
        if (!darkStylesheet || !toggle) return;

        var moonIcon = '<svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false"><path fill="currentColor" d="M14.53 3a9 9 0 1 0 6.47 15.26A8 8 0 1 1 14.53 3z"/></svg>';
        var sunIcon = '<svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2.4"/><line x1="12" y1="2" x2="12" y2="5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><line x1="2" y1="12" x2="5" y2="12" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><line x1="19" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><line x1="4.9" y1="4.9" x2="7.1" y2="7.1" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><line x1="16.9" y1="16.9" x2="19.1" y2="19.1" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><line x1="16.9" y1="7.1" x2="19.1" y2="4.9" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><line x1="4.9" y1="19.1" x2="7.1" y2="16.9" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>';

        function setTheme(mode) {
          var isDark = mode !== "light";
          darkStylesheet.disabled = !isDark;
          document.documentElement.classList.toggle("theme-dark", isDark);
          document.documentElement.classList.toggle("theme-light", !isDark);
          var iconEl = toggle.querySelector(".theme-toggle-icon");
          if (iconEl) iconEl.innerHTML = isDark ? moonIcon : sunIcon;
          toggle.setAttribute("title", isDark ? "Dark mode enabled (click for light mode)" : "Light mode enabled (click for dark mode)");
          toggle.setAttribute("aria-pressed", String(isDark));
        }

        var savedMode = "dark";
        try {
          savedMode = window.localStorage.getItem(storageKey) || "dark";
        } catch (e) {
          savedMode = "dark";
        }
        setTheme(savedMode);

        toggle.addEventListener("click", function () {
          var nextMode = darkStylesheet.disabled ? "dark" : "light";
          setTheme(nextMode);
          try {
            window.localStorage.setItem(storageKey, nextMode);
          } catch (e) {}
        });
      })();
    </script>

    <script>
      (function () {
        var storageKey = "sidebar-collapsed";
        var toggle = document.getElementById("sidebar-toggle");
        if (!toggle) return;

        function setCollapsed(collapsed) {
          document.body.classList.toggle("sidebar-collapsed", collapsed);
          toggle.setAttribute("aria-expanded", String(!collapsed));
          toggle.setAttribute("title", collapsed ? "Expand sidebar" : "Collapse sidebar");
          toggle.textContent = collapsed ? ">" : "<";
        }

        var savedCollapsed = false;
        try {
          savedCollapsed = window.localStorage.getItem(storageKey) === "1";
        } catch (e) {
          savedCollapsed = false;
        }
        setCollapsed(savedCollapsed);

        toggle.addEventListener("click", function () {
          var collapsed = !document.body.classList.contains("sidebar-collapsed");
          setCollapsed(collapsed);
          try {
            window.localStorage.setItem(storageKey, collapsed ? "1" : "0");
          } catch (e) {}
        });
      })();
    </script>

    <script>
      (function () {
        function closeOverlay() {
          var overlay = document.getElementById("image-lightbox-overlay");
          if (!overlay) return;
          document.body.style.overflow = "";
          overlay.remove();
        }

        document.addEventListener("click", function (event) {
          var image = event.target.closest("img.zoomable");
          if (!image) return;

          event.preventDefault();

          var overlay = document.createElement("div");
          overlay.id = "image-lightbox-overlay";
          overlay.style.cssText = [
            "position:fixed",
            "inset:0",
            "background:rgba(0,0,0,0.82)",
            "display:flex",
            "align-items:center",
            "justify-content:center",
            "z-index:9999",
            "cursor:zoom-out",
            "padding:24px"
          ].join(";");

          var popupImage = document.createElement("img");
          popupImage.src = image.currentSrc || image.src;
          popupImage.alt = image.alt || "";
          popupImage.style.cssText = [
            "max-width:96vw",
            "max-height:92vh",
            "border-radius:8px",
            "box-shadow:0 10px 40px rgba(0,0,0,0.4)"
          ].join(";");

          overlay.appendChild(popupImage);
          overlay.addEventListener("click", closeOverlay);
          document.body.appendChild(overlay);
          document.body.style.overflow = "hidden";
        });

        document.addEventListener("keydown", function (event) {
          if (event.key === "Escape") closeOverlay();
        });
      })();
    </script>
  </body>
</html>
